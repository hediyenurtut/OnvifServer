# Sunucu
server.port=8080

# Apache CXF – SOAP 1.2 servlet ayarları
cxf.path=/
cxf.servlet.load-on-startup=1

# ONVIF cihaz bilgileri
onvif.device.manufacturer=OnvifServer
onvif.device.model=ProfileT-1
onvif.device.firmware-version=1.0.0
onvif.device.serial-number=SN-000001
onvif.device.hardware-id=HW-1

# RTSP stream adresi (gerçek RTSP sunucusu ile değiştirin)
onvif.rtsp.host=192.168.1.100
onvif.rtsp.port=554

# Log (geliştirme için)
logging.level.org.apache.cxf=INFO
logging.level.com.onvif=DEBUG

# SOAP mesaj loglama (isteğe bağlı)
cxf.feature.logging.enabled=true
cxf.feature.logging.in-memory-threshold=65536
